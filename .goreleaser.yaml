version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "cd web && pnpm install --frozen-lockfile && pnpm build"

builds:
  - id: symphony
    main: ./cmd/symphony
    binary: symphony
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

brews:
  - name: symphony-go
    repository:
      owner: vnovick
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/vnovick/symphony-go"
    description: "Autonomous AI agent daemon that drives Linear issues through Claude-powered agentic loops."
    license: "Apache-2.0"
    install: |
      bin.install "symphony"
    test: |
      system "#{bin}/symphony", "--version"
