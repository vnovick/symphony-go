# Each command delegates to a Makefile target so `make verify`, lefthook,
# and CI all share one definition of every gate. Leaf web targets do not
# install deps (avoids parallel pnpm install races) — contributors pick up
# install via `make verify` / `make build`. CI installs explicitly.
pre-commit:
  parallel: true
  commands:
    go-vet:
      run: make vet
    go-lint:
      run: make lint-go
    web-typecheck:
      run: make web-typecheck
    web-lint:
      run: make web-lint
    web-format:
      run: make web-format

pre-push:
  parallel: true
  commands:
    go-test:
      run: make test
    go-build:
      run: go build ./...
    web-test:
      run: make web-test
    web-build:
      run: make web-build
